<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Event Invite</title>

<style>
    body {
        background-color: #f0f8ff;
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .card {
        width: 350px;
        height: 450px;
        background-color: white;
        border-radius: 20px;
        overflow: hidden;
        position: relative;
        box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }

    .header {
        background-color: #6a5acd;
        color: white;
        text-align: center;
        padding: 20px;
    }

    .title {
        font-size: 24px;
        font-weight: bold;
    }

    .content {
        padding: 20px;
    }

    .info {
        margin-bottom: 15px;
    }

    .label {
        font-weight: bold;
        color: #6a5acd;
    }

    .decor {
        width: 80px;
        height: 80px;
        background-color: #ff69b4;
        border-radius: 50%;
        position: absolute;
        top: -20px;
        right: -20px;
        z-index: 1;
    }
</style>

</head>
<body>

<div class="card">
    <div class="decor"></div>

    <div class="header">
        <div class="title">Birthday Party</div>
    </div>

    <div class="content">
        <div class="info">
            <span class="label">Date:</span>
            <span>May 10, 2026</span>
        </div>

        <div class="info">
            <span class="label">Time:</span>
            <span>18:00</span>
        </div>

        <div class="info">
            <span class="label">Location:</span>
            <span>Karagandy City Park</span>
        </div>

        <div class="info">
            <span>Come and enjoy music, games, and fun!</span>
        </div>
    </div>
</div>

</body>
</html>
